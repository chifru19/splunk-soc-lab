version: '3.8'

services:
  # Automated Kernel Hardening: Fixes the THP warning on the host VM
  thp-fixer:
    image: alpine
    privileged: true
    pid: host
    network_mode: none
    container_name: thp-fixer
    entrypoint: >
      sh -c "echo never > /sys/kernel/mm/transparent_hugepage/enabled && 
             echo never > /sys/kernel/mm/transparent_hugepage/defrag"
    restart: "no"

  # Primary SIEM: Splunk Enterprise
  splunk-indexer:
    image: splunk/splunk:latest
    container_name: splunk-indexer
    environment:
      - SPLUNK_START_ARGS=--accept-license
      - SPLUNK_PASSWORD=${SPLUNK_PASSWORD}
    ports:
      - "8000:8000"   # Web UI
      - "8088:8088"   # HEC (for attack_gen.py)
      - "9997:9997"   # Forwarding
    volumes:
      - splunk-var:/opt/splunk/var
      - splunk-etc:/opt/splunk/etc
    depends_on:
      - thp-fixer
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  splunk-var:
  splunk-etc: