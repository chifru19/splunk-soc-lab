services:
  splunk-indexer:
    image: splunk/splunk:latest
    container_name: splunk-indexer
    environment:
      - SPLUNK_START_ARGS=--accept-license
      - SPLUNK_PASSWORD=Nsongwa#2026!
      - SPLUNK_GENERAL_TERMS=--accept-sgt-current-at-splunk-com
    ports:
      - "8000:8000"
      - "8088:8088"
      - "9997:9997"
    volumes:
      - ./data:/tmp/data
      # We removed the direct user-seed.conf link to prevent Ansible write-locks
      - splunk-var:/opt/splunk/var
      - splunk-etc:/opt/splunk/etc
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - splunk-network

networks:
  splunk-network:
    name: splunk-network

volumes:
  splunk-var:
  splunk-etc: