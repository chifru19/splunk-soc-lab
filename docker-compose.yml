version: '3.8'

services:
  splunk-indexer:
    image: splunk/splunk:latest
    container_name: splunk-indexer
    environment:
      # These three flags together satisfy the new legal requirements
      - SPLUNK_START_ARGS=--accept-license
      - SPLUNK_GENERAL_TERMS=--accept-sgt-current-at-splunk-com
      - SPLUNK_PASSWORD=Nsongwa#2026!
    ports:
      - "8000:8000"
      - "9997:9997"
    volumes:
      - ./data:/tmp/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  default:
    name: splunk-network