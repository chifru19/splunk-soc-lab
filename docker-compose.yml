version: '3.8'

services:
  splunk-indexer:
    image: splunk/splunk:latest
    container_name: splunk-indexer
    # This automatically loads every variable in your .env file
    env_file:
      - .env
    environment:
      - "SPLUNK_START_ARGS=--accept-license"
      - "SPLUNK_ACCEPT_LICENSE=yes"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  default:
    name: splunk-network