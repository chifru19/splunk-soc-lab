services:
  splunk:
    platform: linux/amd64
    image: splunk/splunk:latest
    container_name: splunk-indexer
    environment:
      - SPLUNK_START_ARGS=--accept-license
      - SPLUNK_PASSWORD=SecurityEngineer2026!
      - SPLUNK_ACCEPT_LICENSE=yes
      - SPLUNK_GENERAL_TERMS=--accept-sgt-current-at-splunk-com
    ports:
      - "8000:8000"
      - "8089:8089"
      - "9997:9997"
    volumes:
      - ./splunk_configs:/opt/splunk/etc/system/local
      - ./data:/tmp/data
    networks:
      - soc-net

  attack-simulator:
    build: .
    container_name: attack-generator
    volumes:
      - ./data:/var/log/attacks
    networks:
      - soc-net
    depends_on:
      - splunk

networks:
  soc-net:
    driver: bridge