name: SOC Lab Security Check

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Secret Scanning Check
        run: |
          # Detects plain PASSWORD but allows our hardened HASHED_PASSWORD by excluding the file
          if grep -rnE "\bPASSWORD\b|SECRET|KEY" . --exclude-dir=.github --exclude=user-seed.conf; then
            echo "SECURITY ALERT: Potential sensitive data found!"
            exit 1
          fi
          echo "Security check passed!"